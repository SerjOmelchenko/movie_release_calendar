<script>
  const API_KEY = '75c5a1d45830643e055bd8265fffb3b5';
  const BASE_URL = 'https://api.themoviedb.org/3';
  const IMG_BASE = 'https://image.tmdb.org/t/p/';

  const today = new Date();
  let currentYear = today.getFullYear();
  let currentMonth = today.getMonth(); // 0-indexed
  let moviesByDate = {}; // { 'YYYY-MM-DD': [movie, ...] }
  let genres = {};

  const statusEl = document.getElementById('status');
  const calendarEl = document.getElementById('calendar');
  const monthLabel = document.getElementById('month-label');
  const searchInput = document.getElementById('search-input');
  const regionSelect = document.getElementById('region-select');

  async function fetchGenres() {
    try {
      const res = await fetch(`${BASE_URL}/genre/movie/list?api_key=${API_KEY}&language=en-US`);
      const data = await res.json();
      if (data.genres) data.genres.forEach(g => { genres[g.id] = g.name; });
    } catch (e) {}
  }

  async function fetchMoviesForMonth(year, month) {
    statusEl.innerHTML = '<div class="spinner"></div>Loading movies...';
    statusEl.style.display = 'block';
    calendarEl.style.display = 'none';

    const pad = n => String(n).padStart(2, '0');
    const firstDay = `${year}-${pad(month + 1)}-01`;
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const lastDay = `${year}-${pad(month + 1)}-${pad(daysInMonth)}`;

    const region = regionSelect.value;
    const regionParam = region ? `&region=${region}` : '';

    moviesByDate = {};

    try {
      let page = 1;
      let totalPages = 1;

      do {
        const url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=en-US` +
          `&primary_release_date.gte=${firstDay}&primary_release_date.lte=${lastDay}` +
          `&sort_by=popularity.desc&page=${page}${regionParam}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        totalPages = Math.min(data.total_pages || 1, 5);
        (data.results || []).forEach(m => {
          if (!m.release_date) return;
          if (!moviesByDate[m.release_date]) moviesByDate[m.release_date] = [];
          moviesByDate[m.release_date].push(m);
        });
        page++;
      } while (page <= totalPages);

      statusEl.style.display = 'none';
      calendarEl.style.display = 'block';
      renderCalendar();
    } catch (err) {
      statusEl.innerHTML = `<p style="color:#e94560;">Failed to load movies: ${err.message}</p>`;
    }
  }

  function getFilteredMoviesByDate() {
    const query = searchInput.value.trim().toLowerCase();
    if (!query) return moviesByDate;
    const filtered = {};
    for (const [date, movies] of Object.entries(moviesByDate)) {
      const matches = movies.filter(m => m.title.toLowerCase().includes(query));
      if (matches.length) filtered[date] = matches;
    }
    return filtered;
  }

  const MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function renderCalendar() {
    const filtered = getFilteredMoviesByDate();
    const pad = n => String(n).padStart(2, '0');

    monthLabel.textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;

    const firstDow = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
    const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

    let html = '<div class="calendar-grid">';

    // Day name headers
    DAY_NAMES.forEach(d => { html += `<div class="day-header">${d}</div>`; });

    // Leading cells from previous month
    for (let i = 0; i < firstDow; i++) {
      const day = daysInPrevMonth - firstDow + 1 + i;
      html += `<div class="day-cell other-month"><div class="day-number">${day}</div></div>`;
    }

    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${pad(currentMonth+1)}-${pad(d)}`;
      const movies = filtered[dateStr] || [];
      const isToday = dateStr === todayStr;

      let cls = 'day-cell';
      if (isToday) cls += ' today';
      if (movies.length > 0) cls += ' has-movies';

      html += `<div class="${cls}" data-date="${dateStr}">`;
      html += `<div class="day-number">${d}</div>`;

      if (movies.length >= 1) {
        const m = movies[0];
        if (m.poster_path) {
          html += `<img class="poster-thumb" src="${IMG_BASE}w185${m.poster_path}" alt="${escHtml(m.title)}" loading="lazy" />`;
        } else {
          html += `<div class="poster-placeholder">${escHtml(m.title)}</div>`;
        }
        if (movies.length > 1) {
          const rest = movies.slice(1);
          const MAX_BARS = 6;
          const bars = rest.slice(0, MAX_BARS);
          const overflow = rest.length - MAX_BARS;
          html += '<div class="cell-bars">';
          bars.forEach(b => {
            const style = b.poster_path
              ? ` style="background-image:url('${IMG_BASE}w92${b.poster_path}')"`
              : '';
            html += `<div class="cell-bar"${style} title="${escHtml(b.title)}" data-id="${b.id}"></div>`;
          });
          if (overflow > 0) {
            html += `<div class="cell-bar-overflow">+${overflow}</div>`;
          }
          html += '</div>';
        }
      }

      html += '</div>';
    }

    // Trailing cells for next month
    const totalCells = firstDow + daysInMonth;
    const trailing = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 1; i <= trailing; i++) {
      html += `<div class="day-cell other-month"><div class="day-number">${i}</div></div>`;
    }

    html += '</div>';
    calendarEl.innerHTML = html;

    calendarEl.querySelectorAll('.cell-bar[data-id]').forEach(bar => {
      bar.addEventListener('click', e => {
        e.stopPropagation();
        const id = parseInt(bar.dataset.id, 10);
        const dateStr = bar.closest('.day-cell').dataset.date;
        const movie = (filtered[dateStr] || []).find(m => m.id === id);
        if (movie) openMovieModal(movie);
      });
    });

    calendarEl.querySelectorAll('.day-cell.has-movies').forEach(cell => {
      cell.addEventListener('click', () => {
        const movies = filtered[cell.dataset.date] || [];
        if (movies.length === 1) {
          openMovieModal(movies[0]);
        } else {
          openDayModal(cell.dataset.date, movies);
        }
      });
    });
  }

  function openDayModal(dateStr, movies) {
    const date = new Date(dateStr + 'T00:00:00');
    const label = date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('day-modal-title').textContent = `Releases — ${label}`;

    document.getElementById('day-movie-list').innerHTML = movies.map(m => `
      <div class="day-movie-item" data-id="${m.id}">
        ${m.poster_path
          ? `<img src="${IMG_BASE}w185${m.poster_path}" alt="${escHtml(m.title)}" loading="lazy" />`
          : `<div class="dm-no-poster">${escHtml(m.title)}</div>`
        }
        <div class="dm-title">${escHtml(m.title)}</div>
      </div>
    `).join('');

    document.getElementById('day-modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';

    document.querySelectorAll('.day-movie-item').forEach(item => {
      item.addEventListener('click', () => {
        const movie = movies.find(m => String(m.id) === item.dataset.id);
        if (movie) { closeDayModal(); openMovieModal(movie); }
      });
    });
  }

  function closeDayModal() {
    document.getElementById('day-modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function openMovieModal(movie) {
    const backdrop = movie.backdrop_path
      ? `${IMG_BASE}w1280${movie.backdrop_path}`
      : (movie.poster_path ? `${IMG_BASE}w780${movie.poster_path}` : '');

    const modalBackdrop = document.getElementById('modal-backdrop');
    modalBackdrop.src = backdrop;
    modalBackdrop.style.display = backdrop ? 'block' : 'none';

    document.getElementById('modal-title').textContent = movie.title;

    const date = movie.release_date
      ? new Date(movie.release_date + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
      : 'TBA';

    const rating = movie.vote_count > 0
      ? `<span>&#9733; ${movie.vote_average.toFixed(1)} / 10 (${movie.vote_count.toLocaleString()} votes)</span>`
      : '<span>Not yet rated</span>';

    document.getElementById('modal-meta').innerHTML = `
      <span>&#128197; ${date}</span>
      ${rating}
      ${movie.original_language ? `<span>&#127758; ${movie.original_language.toUpperCase()}</span>` : ''}
    `;

    document.getElementById('modal-overview').textContent = movie.overview || 'No synopsis available.';

    const movieGenres = (movie.genre_ids || []).map(id => genres[id]).filter(Boolean);
    document.getElementById('modal-genres').innerHTML = movieGenres
      .map(g => `<span class="genre-tag">${escHtml(g)}</span>`)
      .join('');

    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeMovieModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-close').addEventListener('click', closeMovieModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeMovieModal();
  });
  document.getElementById('day-modal-close').addEventListener('click', closeDayModal);
  document.getElementById('day-modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('day-modal-overlay')) closeDayModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeMovieModal(); closeDayModal(); } });

  document.getElementById('prev-month').addEventListener('click', () => {
    if (--currentMonth < 0) { currentMonth = 11; currentYear--; }
    fetchMoviesForMonth(currentYear, currentMonth);
  });

  document.getElementById('next-month').addEventListener('click', () => {
    if (++currentMonth > 11) { currentMonth = 0; currentYear++; }
    fetchMoviesForMonth(currentYear, currentMonth);
  });

  regionSelect.addEventListener('change', () => fetchMoviesForMonth(currentYear, currentMonth));
  searchInput.addEventListener('input', renderCalendar);

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  fetchGenres().then(() => fetchMoviesForMonth(currentYear, currentMonth));

  // Cookie consent banner
  (function() {
    var banner = document.getElementById('cookie-banner');
    var stored;
    try { stored = localStorage.getItem('cookie_consent'); } catch(e) {}
    if (!stored) banner.style.display = 'flex';

    document.getElementById('cookie-accept').addEventListener('click', function() {
      try { localStorage.setItem('cookie_consent', 'accepted'); } catch(e) {}
      gtag('consent', 'update', {
        analytics_storage:  'granted',
        ad_storage:         'granted',
        ad_user_data:       'granted',
        ad_personalization: 'granted'
      });
      dataLayer.push({ event: 'cookie_consent_accepted' });
      banner.style.display = 'none';
    });

    document.getElementById('cookie-decline').addEventListener('click', function() {
      try { localStorage.setItem('cookie_consent', 'declined'); } catch(e) {}
      banner.style.display = 'none';
    });
  })();
</script>
</body>
</html>
