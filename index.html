<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upcoming Movie Releases</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 2rem;
      text-align: center;
      border-bottom: 2px solid #e94560;
    }

    header h1 {
      font-size: 2.2rem;
      color: #fff;
      letter-spacing: 0.05em;
    }

    header p {
      color: #aaa;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 2rem;
      background: #111;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 0.9rem;
      color: #aaa;
    }

    .controls select, .controls input[type="text"] {
      background: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .controls select:focus, .controls input[type="text"]:focus {
      outline: none;
      border-color: #e94560;
    }

    #search-input {
      width: 220px;
    }

    #status {
      text-align: center;
      padding: 3rem;
      color: #777;
      font-size: 1rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .movie-card {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: 1px solid #222;
    }

    .movie-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.25);
      border-color: #e94560;
    }

    .movie-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: #222;
    }

    .movie-card .no-poster {
      width: 100%;
      aspect-ratio: 2/3;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.8rem;
      text-align: center;
      padding: 1rem;
    }

    .movie-card .info {
      padding: 0.8rem;
    }

    .movie-card .title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 0.4rem;
    }

    .movie-card .release-date {
      font-size: 0.8rem;
      color: #e94560;
      font-weight: 500;
    }

    .movie-card .rating {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      color: #f5c518;
      margin-top: 0.3rem;
    }

    .movie-card .overview {
      font-size: 0.78rem;
      color: #888;
      margin-top: 0.4rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      padding: 2rem;
    }

    .pagination button {
      background: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .pagination button:hover:not(:disabled) {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    .pagination button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .pagination .page-info {
      color: #777;
      font-size: 0.9rem;
    }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #modal-overlay.open {
      display: flex;
    }

    #modal {
      background: #1a1a1a;
      border-radius: 12px;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid #333;
      position: relative;
    }

    #modal .modal-backdrop {
      width: 100%;
      height: 200px;
      object-fit: cover;
      object-position: center top;
      display: block;
      border-radius: 12px 12px 0 0;
      background: #222;
    }

    #modal .modal-body {
      padding: 1.5rem;
    }

    #modal .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    #modal .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #aaa;
    }

    #modal .modal-meta span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    #modal .modal-overview {
      font-size: 0.95rem;
      color: #ccc;
      line-height: 1.6;
    }

    #modal .modal-genres {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    #modal .genre-tag {
      background: #0f3460;
      color: #90caf9;
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      font-size: 0.78rem;
    }

    #modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    #modal-close:hover { background: #e94560; }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #555;
      font-size: 0.8rem;
      border-top: 1px solid #1e1e1e;
    }

    footer a { color: #e94560; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>Upcoming Movie Releases</h1>
  <p>Powered by The Movie Database (TMDB)</p>
</header>

<div class="controls">
  <label for="search-input">Search:</label>
  <input type="text" id="search-input" placeholder="Filter by title..." />

  <label for="sort-select">Sort by:</label>
  <select id="sort-select">
    <option value="release_date">Release Date</option>
    <option value="popularity">Popularity</option>
    <option value="vote_average">Rating</option>
    <option value="title">Title</option>
  </select>

  <label for="region-select">Region:</label>
  <select id="region-select">
    <option value="">All</option>
    <option value="US">United States</option>
    <option value="GB">United Kingdom</option>
    <option value="CA">Canada</option>
    <option value="AU">Australia</option>
    <option value="FR">France</option>
    <option value="DE">Germany</option>
    <option value="JP">Japan</option>
    <option value="KR">South Korea</option>
    <option value="IN">India</option>
  </select>
</div>

<div id="status">
  <div class="spinner"></div>
  Loading upcoming movies...
</div>

<div id="movies-grid" style="display:none;"></div>

<div class="pagination" id="pagination" style="display:none;">
  <button id="prev-btn" disabled>&#8592; Previous</button>
  <span class="page-info" id="page-info"></span>
  <button id="next-btn">Next &#8594;</button>
</div>

<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" title="Close">&#x2715;</button>
    <img id="modal-backdrop" class="modal-backdrop" src="" alt="" />
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <p class="modal-overview" id="modal-overview"></p>
      <div class="modal-genres" id="modal-genres"></div>
    </div>
  </div>
</div>

<footer>
  Data provided by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a>.
  This product uses the TMDB API but is not endorsed or certified by TMDB.
</footer>

<script>
  const API_KEY = '75c5a1d45830643e055bd8265fffb3b5';
  const BASE_URL = 'https://api.themoviedb.org/3';
  const IMG_BASE = 'https://image.tmdb.org/t/p/';

  let currentPage = 1;
  let totalPages = 1;
  let allMovies = [];
  let genres = {};

  const grid = document.getElementById('movies-grid');
  const status = document.getElementById('status');
  const pagination = document.getElementById('pagination');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const pageInfo = document.getElementById('page-info');
  const searchInput = document.getElementById('search-input');
  const sortSelect = document.getElementById('sort-select');
  const regionSelect = document.getElementById('region-select');
  const modalOverlay = document.getElementById('modal-overlay');

  async function fetchGenres() {
    try {
      const res = await fetch(`${BASE_URL}/genre/movie/list?api_key=${API_KEY}&language=en-US`);
      const data = await res.json();
      if (data.genres) {
        data.genres.forEach(g => { genres[g.id] = g.name; });
      }
    } catch (e) {
      console.warn('Could not load genres', e);
    }
  }

  async function fetchMovies(page = 1) {
    status.innerHTML = '<div class="spinner"></div>Loading upcoming movies...';
    status.style.display = 'block';
    grid.style.display = 'none';
    pagination.style.display = 'none';

    const region = regionSelect.value;
    const regionParam = region ? `&region=${region}` : '';

    try {
      const res = await fetch(
        `${BASE_URL}/movie/upcoming?api_key=${API_KEY}&language=en-US&page=${page}${regionParam}`
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      allMovies = data.results || [];
      totalPages = Math.min(data.total_pages || 1, 20); // cap at 20 pages
      currentPage = data.page || page;

      renderMovies();
    } catch (err) {
      status.innerHTML = `<p style="color:#e94560;">Failed to load movies: ${err.message}</p>`;
      status.style.display = 'block';
    }
  }

  function renderMovies() {
    const query = searchInput.value.trim().toLowerCase();
    const sort = sortSelect.value;

    let movies = allMovies.filter(m =>
      !query || m.title.toLowerCase().includes(query)
    );

    movies.sort((a, b) => {
      if (sort === 'release_date') return (a.release_date || '').localeCompare(b.release_date || '');
      if (sort === 'popularity') return b.popularity - a.popularity;
      if (sort === 'vote_average') return b.vote_average - a.vote_average;
      if (sort === 'title') return a.title.localeCompare(b.title);
      return 0;
    });

    if (!movies.length) {
      status.innerHTML = '<p>No upcoming movies found.</p>';
      status.style.display = 'block';
      grid.style.display = 'none';
      pagination.style.display = 'none';
      return;
    }

    status.style.display = 'none';
    grid.style.display = 'grid';
    pagination.style.display = 'flex';

    grid.innerHTML = movies.map(movie => {
      const poster = movie.poster_path
        ? `<img src="${IMG_BASE}w300${movie.poster_path}" alt="${escHtml(movie.title)}" loading="lazy" />`
        : `<div class="no-poster">No poster available</div>`;

      const date = movie.release_date
        ? new Date(movie.release_date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
        : 'TBA';

      const rating = movie.vote_count > 0
        ? `<span class="rating">&#9733; ${movie.vote_average.toFixed(1)}</span>`
        : '';

      return `
        <div class="movie-card" data-id="${movie.id}" title="${escHtml(movie.title)}">
          ${poster}
          <div class="info">
            <div class="title">${escHtml(movie.title)}</div>
            <div class="release-date">${date}</div>
            ${rating}
            <div class="overview">${escHtml(movie.overview || '')}</div>
          </div>
        </div>`;
    }).join('');

    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
    pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;

    grid.querySelectorAll('.movie-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.id;
        const movie = allMovies.find(m => String(m.id) === id);
        if (movie) openModal(movie);
      });
    });
  }

  function openModal(movie) {
    const backdrop = movie.backdrop_path
      ? `${IMG_BASE}w1280${movie.backdrop_path}`
      : (movie.poster_path ? `${IMG_BASE}w780${movie.poster_path}` : '');

    const modalBackdrop = document.getElementById('modal-backdrop');
    modalBackdrop.src = backdrop;
    modalBackdrop.style.display = backdrop ? 'block' : 'none';

    document.getElementById('modal-title').textContent = movie.title;

    const date = movie.release_date
      ? new Date(movie.release_date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
      : 'TBA';

    const rating = movie.vote_count > 0
      ? `<span>&#9733; ${movie.vote_average.toFixed(1)} / 10 (${movie.vote_count.toLocaleString()} votes)</span>`
      : '<span>Not yet rated</span>';

    document.getElementById('modal-meta').innerHTML = `
      <span>&#128197; ${date}</span>
      ${rating}
      ${movie.original_language ? `<span>&#127758; ${movie.original_language.toUpperCase()}</span>` : ''}
    `;

    document.getElementById('modal-overview').textContent = movie.overview || 'No synopsis available.';

    const movieGenres = (movie.genre_ids || []).map(id => genres[id]).filter(Boolean);
    document.getElementById('modal-genres').innerHTML = movieGenres
      .map(g => `<span class="genre-tag">${escHtml(g)}</span>`)
      .join('');

    modalOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modalOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  prevBtn.addEventListener('click', () => { if (currentPage > 1) fetchMovies(currentPage - 1); });
  nextBtn.addEventListener('click', () => { if (currentPage < totalPages) fetchMovies(currentPage + 1); });

  searchInput.addEventListener('input', renderMovies);
  sortSelect.addEventListener('change', renderMovies);
  regionSelect.addEventListener('change', () => { currentPage = 1; fetchMovies(1); });

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Init
  fetchGenres().then(() => fetchMovies(1));
</script>
</body>
</html>
