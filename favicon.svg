<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Film clapperboard icon -->
  <rect width="100" height="100" rx="12" fill="#0d0d0d"/>
  <!-- Clapperboard body -->
  <rect x="15" y="38" width="70" height="48" rx="4" fill="#e0e0e0"/>
  <!-- Clapperboard top bar -->
  <rect x="15" y="28" width="70" height="14" rx="3" fill="#c0392b"/>
  <!-- Clapper stripes -->
  <polygon points="15,28 28,28 22,42 15,42" fill="#1a1a1a"/>
  <polygon points="36,28 49,28 43,42 30,42" fill="#1a1a1a"/>
  <polygon points="57,28 70,28 64,42 51,42" fill="#1a1a1a"/>
  <polygon points="78,28 85,28 85,34 72,42 65,42" fill="#1a1a1a"/>
  <!-- Film sprockets -->
  <circle cx="26" cy="58" r="6" fill="#0d0d0d"/>
  <circle cx="26" cy="58" r="3" fill="#e0e0e0"/>
  <circle cx="74" cy="58" r="6" fill="#0d0d0d"/>
  <circle cx="74" cy="58" r="3" fill="#e0e0e0"/>
  <!-- Film strip lines -->
  <rect x="35" y="53" width="30" height="10" rx="2" fill="#0d0d0d"/>
  <!-- Bottom film strip -->
  <rect x="20" y="72" width="60" height="8" rx="2" fill="#b0b0b0"/>
</svg>
